<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>

  <!-- K spine (vertical bar) -->
  <rect x="11" y="10" width="7" height="28" rx="2" fill="white"/>

  <!-- K upper arm -->
  <polygon points="16,24 35,10 35,17.5 21.5,24" fill="white"/>

  <!-- K lower arm -->
  <polygon points="16,24 35,38 35,30.5 21.5,24" fill="white"/>

  <!-- Neural node accent at K joint — adds AI feel -->
  <circle cx="18" cy="24" r="3.5" fill="url(#dot)"/>
</svg>
